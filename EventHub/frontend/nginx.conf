# ── HTTP (порт 80 → host 4200): десктоп-доступ по http://localhost:4200 ──
server {
    listen 80;
    server_name _;

    include /etc/nginx/snippets/eventhub-locations.conf;
}

# ── HTTPS (порт 443): нужен для камеры (getUserMedia требует secure context) ──
# Доступ с телефона: https://192.168.0.16/  (принять предупреждение о self-signed серте)
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    include /etc/nginx/snippets/eventhub-locations.conf;
}
