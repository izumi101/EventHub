# Общие директивы для HTTP (80) и HTTPS (443) server-блоков.
# Подключается через `include` в nginx.conf.

root /usr/share/nginx/html;
index index.html;

# ── Gzip Compression ──
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml
    font/woff2;

# ── Security Headers ──
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;

# ── WebSocket Proxy (Django Channels / real-time seat map) ──
location /ws/ {
    proxy_pass http://backend:8000/ws/;
    proxy_http_version 1.1;
    # Required headers for WebSocket upgrade
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;  # keep WS alive up to 24h
    proxy_send_timeout 86400s;
}

# ── API Proxy ──
location /api/ {
    proxy_pass http://backend:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s;
    proxy_read_timeout 60s;
}

# ── Media Proxy ──
# ^~ даёт приоритет над regex-локейшнами (в т.ч. над ~* \.(jpg|png|…))
location ^~ /media/ {
    proxy_pass http://backend:8000/media/;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    expires 7d;
    add_header Cache-Control "public, no-transform";
}

# ── Static Assets (hashed filenames) ──
location ~* \.(js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# ── Angular SPA Fallback ──
location / {
    try_files $uri $uri/ /index.html;
}
